services:
  db:
    image: postgres:16
    container_name: dispatcherone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dispatcherone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dispatcherone_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-dispatcherone}
    volumes:
      - dispatcherone_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dispatcherone} -d ${POSTGRES_DB:-dispatcherone}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
    container_name: dispatcherone-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  dispatcherone_pgdata:
